name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build
        run: |
          xcodebuild \
            -project peek.xcodeproj \
            -scheme peek \
            -configuration Debug \
            -destination 'platform=macOS' \
            build \
            CODE_SIGNING_ALLOWED=NO

      - name: Test
        run: |
          if xcodebuild -project peek.xcodeproj -scheme peek -list 2>&1 | grep -q "Test"; then
            xcodebuild \
              -project peek.xcodeproj \
              -scheme peek \
              -configuration Debug \
              -destination 'platform=macOS' \
              test \
              CODE_SIGNING_ALLOWED=NO
          else
            echo "No test target configured yet — skipping."
          fi
